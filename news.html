<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPEXplore | News Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <header class="header">
    <div class="header-container max-w-1280 mx-auto row-between">
      <div class="logo">
        <a href="index.html" style="text-decoration: none; color: inherit;">
          <span>📊</span>
          <span>TPEXplore News Desk</span>
        </a>
      </div>
    </div>
  </header>

  <main class="main-content max-w-1280 mx-auto" style="max-width: 800px; padding: 3rem 16px;">
    <div class="card ptt-container flex-col" style="padding: 2.5rem; gap: 1.5rem;">
      <div class="news-meta row-between">
        <span class="news-tag" id="articleTag" style="font-size: 0.9rem; padding: 0.3rem 0.6rem;">標籤</span>
        <span class="news-time" id="articleTime" style="font-size: 0.9rem;">時間</span>
      </div>
      
      <h1 id="articleTitle" style="font-size: 2rem; font-weight: 700; color: hsl(var(--foreground)); line-height: 1.4; margin-top: 1rem;">
        載入中...
      </h1>
      
      <hr style="border-color: hsl(var(--border)); margin: 1.5rem 0;" />
      
      <div id="articleContent" class="card-description leading-relaxed" style="font-size: 1.1rem; color: hsl(var(--foreground));">
        這是一篇詳細的新聞內文模擬。您能在這裡閱讀包含台積電法說會細節、聯發科新品發表、長榮航運運價等即時性綜合總結報導。
        <br><br>
        (此為靜態頁面展示內容，實際應用中可透過後端或 API 抓取完整的 HTML 格式財經新聞並渲染於此區塊。 shadcn/ui 的排版規則能讓長篇文章呈現如 Notion 般的高閱讀舒適度。)
      </div>
      
      <div style="margin-top: 3rem;">
        <a href="index.html" class="badge neutral" style="font-size: 0.9rem; padding: 0.6rem 1.2rem; display: inline-flex;">返回儀表板</a>
      </div>
    </div>
  </main>

  <script>
    const realNews = [
      { tag: '大盤走勢', time: '1 小時前', title: '台股出現報復性反彈近千點！台指期開盤收復失土，大盤強勢站穩三萬大關' },
      { tag: '半導體', time: '2 小時前', title: '【殺積盤轉拉積盤】台積電(2330)強勢表態，收盤價創下歷史新高來到 1845 元行情' },
      { tag: '權值股', time: '3 小時前', title: '鴻海(2317)法說會釋出利多，AI伺服器拉貨動能強勁，早盤漲幅達半根停板' },
      { tag: '晶片設計', time: '4 小時前', title: '聯發科(2454)宣布新一代天璣晶片正式投產，供應商名單與受惠股一次看' },
      { tag: '總經動態', time: '5 小時前', title: 'FOMC釋放鴿派訊號確認降息空間，資金潮挹注亞洲新興市場與台幣走升' },
      { tag: '法人籌碼', time: '6 小時前', title: '外資終止連四賣！今日回補百億資金，鎖定金融、重電與先進封裝概念股' },
      { tag: '綠能電網', time: '8 小時前', title: '台電強韌電網計畫預算加碼，華城(1519)、中興電(1513)雙雙亮燈鎖死' },
      { tag: '航運族群', time: '10 小時前', title: '紅海危機外溢效應？貨櫃三雄長榮(2603)帶量上攻，運價指數再創波段新高' }
    ];

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const articleId = parseInt(urlParams.get('id'));
      
      if (!isNaN(articleId) && realNews[articleId]) {
        const article = realNews[articleId];
        document.getElementById('articleTitle').innerText = article.title;
        document.getElementById('articleTag').innerText = article.tag;
        document.getElementById('articleTime').innerText = article.time;
      } else {
        document.getElementById('articleTitle').innerText = "找不到該則新聞";
      }
    });
  </script>
</body>
</html>
